<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推忍びダービー</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    
    <style>
        :root {
            --ink: #44384f;
            --muted: #7c7089;
            --pink: #ff6f9f;
            --pink-dark: #eb4f88;
            --purple: #8d6bff;
            --purple-dark: #6f52df;
            --yellow: #ffd85c;
            --mint: #68dfc1;
            --sky: #68c9ff;
            --cream: #fffaf4;
            --white: rgba(255, 255, 255, 0.94);
            --shadow: 0 14px 32px rgba(97, 68, 128, 0.17);
            --soft-shadow: 0 8px 20px rgba(97, 68, 128, 0.13);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--ink);
            font-family: 'M PLUS Rounded 1c', 'Hiragino Maru Gothic ProN', sans-serif;
            background:
                radial-gradient(circle at 10% 10%, rgba(255, 216, 92, .45) 0 70px, transparent 72px),
                radial-gradient(circle at 92% 18%, rgba(104, 223, 193, .35) 0 95px, transparent 97px),
                radial-gradient(circle at 14% 82%, rgba(141, 107, 255, .22) 0 120px, transparent 122px),
                linear-gradient(145deg, #fff4f8 0%, #f5efff 46%, #eaf9ff 100%);
            background-attachment: fixed;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            z-index: -1;
            width: 220px;
            height: 220px;
            border: 22px solid rgba(255, 255, 255, .44);
            border-radius: 42% 58% 64% 36%;
            animation: floatShape 10s ease-in-out infinite alternate;
        }

        body::before { top: -70px; left: -80px; transform: rotate(18deg); }
        body::after { right: -90px; bottom: -90px; animation-delay: -4s; }

        .container {
            width: min(1120px, calc(100% - 28px));
            margin: 0 auto;
            padding: 26px 0 46px;
        }

        .header {
            position: relative;
            text-align: center;
            margin-bottom: 22px;
            padding: 14px 18px 4px;
        }

        .logo-badge {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 7px;
            padding: 6px 15px;
            color: #fff;
            font-size: .73rem;
            font-weight: 800;
            letter-spacing: .13em;
            border: 3px solid rgba(255, 255, 255, .88);
            border-radius: 999px;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            box-shadow: 0 6px 0 rgba(111, 82, 223, .18);
        }

        .title {
            margin-bottom: 4px;
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: clamp(2.35rem, 7vw, 4.5rem);
            font-weight: 900;
            line-height: 1.08;
            letter-spacing: .02em;
            color: var(--pink);
            background: linear-gradient(100deg, #ff4f91 5%, #ff8a65 32%, #8d6bff 67%, #48bde9 95%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 0 rgba(255, 255, 255, .95));
        }

        .subtitle {
            margin-bottom: 14px;
            color: var(--muted);
            font-size: clamp(.85rem, 2vw, 1rem);
            font-weight: 700;
        }

        .stats {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat-item {
            min-width: 148px;
            padding: 10px 17px;
            border: 3px solid #fff;
            border-radius: 18px;
            background: rgba(255, 255, 255, .82);
            box-shadow: var(--soft-shadow);
            backdrop-filter: blur(8px);
            font-size: .95rem;
        }

        .stat-icon { margin-right: 6px; font-size: 1.1rem; }
        .score { color: #e74f88; font-weight: 800; }
        .race-count { color: #6f52df; font-weight: 800; }

        .viewport {
            position: relative;
            overflow: hidden;
            margin-bottom: 18px;
            padding: 7px;
            border: 3px solid rgba(255, 255, 255, .96);
            border-radius: 30px;
            background: linear-gradient(135deg, #ff8db3, #9b7cff 50%, #65d9ed);
            box-shadow: 0 18px 45px rgba(90, 57, 123, .22), inset 0 0 0 1px rgba(255,255,255,.4);
        }

        .viewport::before {
            content: '✦ 3D RACE FIELD ✦';
            position: absolute;
            z-index: 5;
            top: 17px;
            left: 18px;
            padding: 6px 11px;
            border-radius: 999px;
            color: #fff;
            background: rgba(74, 54, 91, .58);
            backdrop-filter: blur(8px);
            font-size: .67rem;
            font-weight: 800;
            letter-spacing: .08em;
            pointer-events: none;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 470px;
            border-radius: 21px;
            background: #8fd3ff;
        }

        .control-panel {
            position: relative;
            overflow: hidden;
            padding: clamp(22px, 4vw, 34px);
            border: 4px solid rgba(255, 255, 255, .92);
            border-radius: 30px;
            background: rgba(255, 255, 255, .86);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
        }

        .control-panel::before {
            content: '';
            position: absolute;
            top: -75px;
            right: -55px;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,216,92,.4), rgba(255,111,159,.1) 60%, transparent 62%);
            pointer-events: none;
        }

        .phase-title {
            position: relative;
            margin-bottom: 25px;
            text-align: center;
            color: var(--ink);
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: clamp(1.35rem, 4vw, 2rem);
            font-weight: 900;
            line-height: 1.35;
        }

        .phase-title::after {
            content: '';
            display: block;
            width: 74px;
            height: 7px;
            margin: 9px auto 0;
            border-radius: 99px;
            background: linear-gradient(90deg, var(--pink), var(--yellow), var(--mint));
        }

        .player-count-selection {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            max-width: 660px;
            margin: 0 auto 8px;
        }

        .count-button,
        .start-button,
        .reset-button {
            font-family: inherit;
            font-weight: 800;
            border: none;
            cursor: pointer;
            transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
        }

        .count-button {
            position: relative;
            padding: 18px 10px;
            color: #fff;
            font-size: clamp(1rem, 3vw, 1.22rem);
            border: 3px solid #fff;
            border-radius: 22px;
            box-shadow: 0 7px 0 rgba(91, 65, 117, .18);
        }

        .count-button:nth-child(1) { background: linear-gradient(145deg, #ff84ad, #ff5e91); }
        .count-button:nth-child(2) { background: linear-gradient(145deg, #a58bff, #8060ed); }
        .count-button:nth-child(3) { background: linear-gradient(145deg, #68ddce, #34bcb2); }

        .count-button:hover,
        .start-button:hover,
        .reset-button:hover {
            transform: translateY(-3px) scale(1.02);
            filter: saturate(1.08);
        }

        .count-button:active,
        .start-button:active,
        .reset-button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 rgba(91, 65, 117, .22);
        }

        .horse-selection {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 25px;
        }

        .horse-card {
            position: relative;
            z-index: 1;
            overflow: hidden;
            min-width: 0;
            padding: 14px 12px 16px;
            text-align: center;
            cursor: pointer;
            border: 4px solid #fff;
            border-radius: 25px;
            background: linear-gradient(160deg, rgba(255,255,255,.96), rgba(250,242,255,.92));
            box-shadow: 0 8px 0 rgba(122, 91, 149, .13), 0 13px 24px rgba(93, 64, 120, .12);
            transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
        }

        .horse-card:nth-child(1) { --card-accent: #ff6f9f; }
        .horse-card:nth-child(2) { --card-accent: #ffad4d; }
        .horse-card:nth-child(3) { --card-accent: #8d6bff; }
        .horse-card:nth-child(4) { --card-accent: #46cdb6; }

        .horse-card::before {
            content: '';
            position: absolute;
            z-index: -1;
            inset: 0;
            background-image: var(--char-bg);
            background-size: cover;
            background-position: center;
            opacity: .6;
            transition: transform .35s ease;
        }

        .horse-card:hover {
            transform: translateY(-6px) rotate(-1deg);
            border-color: var(--card-accent);
            box-shadow: 0 10px 0 color-mix(in srgb, var(--card-accent) 25%, transparent), 0 18px 30px rgba(93,64,120,.17);
        }

        .horse-card:hover::before { transform: scale(1.08); }

        .horse-card.selected {
            transform: translateY(-7px) scale(1.035);
            border-color: var(--card-accent);
            background: #fff;
            box-shadow: 0 0 0 5px color-mix(in srgb, var(--card-accent) 18%, transparent), 0 11px 0 color-mix(in srgb, var(--card-accent) 30%, transparent);
        }

        .horse-card.selected::after {
            content: '✓';
            position: absolute;
            z-index: 7;
            top: 8px;
            left: 8px;
            display: grid;
            place-items: center;
            width: 30px;
            height: 30px;
            color: #fff;
            border: 3px solid #fff;
            border-radius: 50%;
            background: var(--card-accent);
            font-size: 1rem;
            font-weight: 900;
            box-shadow: 0 4px 10px rgba(66, 48, 80, .2);
        }

        .model-badge {
            position: absolute;
            z-index: 6;
            top: 9px;
            right: 9px;
            padding: 4px 9px;
            color: #fff;
            border: 2px solid rgba(255,255,255,.9);
            border-radius: 999px;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            box-shadow: 0 4px 10px rgba(124,77,255,.2);
            font-size: .65rem;
            font-weight: 800;
        }

        .character-preview {
            height: 165px;
            margin: -5px auto 3px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .character-preview img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 11px 9px rgba(65, 38, 92, .24));
        }

        .character-preview .preview-fallback { font-size: 4rem; }
        .horse-card > * { position: relative; }

        .horse-name {
            margin-bottom: 3px;
            color: var(--ink);
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 1.18rem;
            font-weight: 900;
            text-shadow: 0 2px 0 #fff;
        }

        .horse-lane {
            display: inline-flex;
            padding: 3px 10px;
            color: var(--card-accent);
            border-radius: 99px;
            background: color-mix(in srgb, var(--card-accent) 12%, white);
            font-size: .72rem;
            font-weight: 800;
        }

        .start-button,
        .reset-button {
            display: block;
            min-width: min(320px, 92%);
            margin: 0 auto;
            padding: 16px 28px;
            color: #fff;
            border: 4px solid #fff;
            border-radius: 999px;
            font-size: clamp(1.05rem, 3vw, 1.3rem);
            letter-spacing: .04em;
        }

        .start-button {
            background: linear-gradient(100deg, #ff5f96, #ff9068 42%, #8d6bff);
            box-shadow: 0 8px 0 #d94f83, 0 15px 25px rgba(255,95,150,.25);
            animation: buttonGlow 2.3s ease-in-out infinite;
        }

        .reset-button {
            background: linear-gradient(100deg, #58c9ed, #7b68e8);
            box-shadow: 0 8px 0 #5f4dc3, 0 15px 25px rgba(95,77,195,.2);
        }

        .racing-phase,
        .result-phase {
            position: relative;
            text-align: center;
            padding: 8px 0 3px;
        }

        .racing-phase h2,
        .result-phase h2 {
            margin-bottom: 9px;
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: clamp(1.7rem, 5vw, 2.45rem);
            font-weight: 900;
        }

        .racing-phase h2 {
            color: var(--pink-dark);
            animation: raceBounce .8s ease-in-out infinite alternate;
        }

        .prediction {
            display: inline-flex;
            padding: 8px 16px;
            color: var(--purple-dark);
            border: 3px solid #e9dfff;
            border-radius: 999px;
            background: #f9f5ff;
            font-weight: 800;
        }

        .winner-announcement {
            margin-bottom: 4px;
            color: var(--purple-dark);
            font-size: clamp(1.15rem, 4vw, 1.6rem);
            font-weight: 900;
        }

        .result-message {
            max-width: 560px;
            margin: 0 auto 23px;
            padding: 18px;
            border: 4px solid #fff;
            border-radius: 22px;
            box-shadow: var(--soft-shadow);
        }

        .result-message.success {
            color: #247b67;
            background: linear-gradient(135deg, #dcfff4, #fff7c6);
        }

        .result-message.failure {
            color: #9e5570;
            background: linear-gradient(135deg, #fff0f5, #f4ecff);
        }

        .result-title { margin-bottom: 5px; font-size: 1.28rem; font-weight: 900; }
        .points { font-weight: 700; }

        .confetti-layer {
            position: fixed;
            z-index: 800;
            inset: 0;
            display: none;
            overflow: hidden;
            pointer-events: none;
        }

        .confetti-layer.active { display: block; }

        .confetti-piece {
            position: absolute;
            top: -10vh;
            width: 10px;
            height: 18px;
            border-radius: 2px;
            opacity: 0;
            animation: confettiFall var(--fall-duration) cubic-bezier(.18, .72, .24, 1) var(--fall-delay) forwards;
            will-change: transform, opacity;
        }

        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translate3d(0, -8vh, 0) rotate(0deg);
            }
            88% { opacity: 1; }
            100% {
                opacity: 0;
                transform: translate3d(var(--drift), 112vh, 0) rotate(var(--spin));
            }
        }

        #loadingOverlay {
            position: fixed;
            z-index: 999;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--purple-dark);
            background: linear-gradient(145deg, rgba(255,244,248,.97), rgba(239,246,255,.97));
            backdrop-filter: blur(10px);
        }

        .loading-box {
            min-width: 230px;
            padding: 28px;
            text-align: center;
            border: 4px solid #fff;
            border-radius: 28px;
            background: rgba(255,255,255,.88);
            box-shadow: var(--shadow);
            font-weight: 900;
        }

        .loading-icon {
            display: block;
            margin-bottom: 10px;
            font-size: 3rem;
            animation: loadingHop .7s ease-in-out infinite alternate;
        }

        .loading-dots::after {
            content: '';
            animation: loadingDots 1.2s steps(4, end) infinite;
        }

        @keyframes floatShape {
            to { transform: translate(18px, 25px) rotate(34deg); }
        }

        @keyframes buttonGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.08) saturate(1.06); }
        }

        @keyframes raceBounce {
            to { transform: translateY(-5px) scale(1.02); }
        }

        @keyframes loadingHop {
            to { transform: translateY(-8px) rotate(6deg); }
        }

        @keyframes loadingDots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75%, 100% { content: '...'; }
        }

        @media (max-width: 880px) {
            .horse-selection { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .character-preview { height: 190px; }
            #gameCanvas { height: 410px; }
        }

        @media (max-width: 560px) {
            .container { width: min(100% - 16px, 1120px); padding-top: 14px; }
            .header { padding-inline: 5px; }
            .title { font-size: clamp(2.25rem, 13vw, 3.35rem); }
            .subtitle { padding-inline: 14px; }
            .stats { gap: 7px; }
            .stat-item { min-width: 0; flex: 1; padding: 8px 9px; font-size: .82rem; }
            .viewport { padding: 5px; border-radius: 23px; }
            .viewport::before { top: 12px; left: 12px; font-size: .57rem; }
            #gameCanvas { height: 340px; border-radius: 16px; }
            .control-panel { padding: 22px 14px; border-radius: 24px; }
            .player-count-selection { gap: 8px; }
            .count-button { padding: 14px 5px; border-radius: 17px; }
            .horse-selection { gap: 9px; }
            .horse-card { padding: 10px 7px 13px; border-width: 3px; border-radius: 20px; }
            .character-preview { height: 145px; }
            .horse-name { font-size: 1rem; }
            .model-badge { top: 6px; right: 6px; padding: 3px 7px; font-size: .57rem; }
            .start-button, .reset-button { padding: 14px 17px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: .01ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>
<body>
    <div id="loadingOverlay">
        <div class="loading-box">
            <span class="loading-icon">🦊</span>
            <span>3Dゲームを準備中<span class="loading-dots"></span></span>
        </div>
    </div>
    
    <div id="confettiLayer" class="confetti-layer" aria-hidden="true"></div>

    <div class="container">
        <div class="header">
            <div class="logo-badge">✦ 3D POP RACING ✦</div>
            <h1 class="title">推忍びダービー</h1>
            <p class="subtitle">推しの忍びを選んで、ドキドキのレースを楽しもう！</p>
            <div class="stats">
                <div class="stat-item">
                    <span class="score"><span class="stat-icon">⭐</span>スコア：<span id="score">0</span>点</span>
                </div>
                <div class="stat-item">
                    <span class="race-count"><span class="stat-icon">🏁</span>レース：<span id="raceCount">0</span>回</span>
                </div>
            </div>
        </div>
        <div class="viewport">
            <canvas id="gameCanvas"></canvas>
        </div>
        <div class="control-panel">
            <div id="setupPhase" style="display: none;">
                <h2 class="phase-title">まずは参加人数を選ぼう！</h2>
                <div class="player-count-selection">
                    <button class="count-button" onclick="setupRace(2)">👥 2人</button>
                    <button class="count-button" onclick="setupRace(3)">🎉 3人</button>
                    <button class="count-button" onclick="setupRace(4)">🌟 4人</button>
                </div>
            </div>
            <div id="bettingPhase" class="betting-phase" style="display: none;">
                <h2 class="phase-title">どの忍びが勝つか予想しよう！</h2>
                <div class="horse-selection" id="horseSelection"></div>
                <button class="start-button" onclick="startRace()">🏁 レーススタート！</button>
            </div>
            <div id="racingPhase" class="racing-phase" style="display: none;">
                <h2>レース中！</h2>
                <div class="prediction">あなたの予想: <span id="selectedHorseName"></span></div>
            </div>
            <div id="resultPhase" class="result-phase" style="display: none;">
                <h2>🏆 レース結果 🏆</h2>
                <div class="winner-announcement">優勝: <span id="winnerName"></span>！</div>

                <div id="resultMessage" class="result-message">
                    <div class="result-title"></div>
                    <div class="points"></div>
                </div>
                <button class="reset-button" onclick="resetGame()">🔄 もう一度あそぶ</button>
            </div>
        </div>
    </div>

    <audio id="raceBgm" src="race_bgm.mp3" loop></audio>

    <script>
        let obstacles = [], obstacleMeshes = [], stumbleTimers = [];
        let gameState = 'setup', selectedHorse = null, winner = null, score = 0, raceCount = 0;
        let numHorses = 0, raceProgress = [], speeds = [];
        let scene, camera, renderer, characters = [], characterMixers = [], characterThumbnails = [], animationId;
        const allHorses = [
            { id: 0, name: 'オト', emoji: '🦊', is3D: true }, { id: 1, name: 'シャオラン', emoji: '☀️', is3D: true },
            { id: 2, name: 'ネム', emoji: '🌈', is3D: true }, { id: 3, name: 'ウカ', emoji: '⛩️', is3D: true }
        ];
        let currentHorses = [];
        const TRACK_LENGTH = 20, FINISH_LINE = 18, MAX_HORSES = 4;
        const clock = new THREE.Clock();
        const cameraTarget = new THREE.Vector3(0, 1, 5);
        const characterImageFiles = ['syaoran1.webp', 'sakuya1.webp', 'remu1.webp', 'hinanojyou1.webp'];
        const OTO_MODEL_FILE = 'assets/oto-running.glb';
        const SYAORAN_MODEL_FILE = 'assets/syaoran-running.glb';
        const UKA_MODEL_FILE = 'assets/uka-running.glb';
        const NEMU_MODEL_FILE = 'assets/nemu-running.glb';

        function init() {
            const canvas = document.getElementById('gameCanvas');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x8fd3ff);
            scene.fog = new THREE.Fog(0x8fd3ff, 18, 46);

            camera = new THREE.PerspectiveCamera(58, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
            camera.position.set(0, 4.2, 15);
            cameraTarget.set(0, 1, 5);
            camera.lookAt(cameraTarget);

            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, powerPreference: 'high-performance' });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.05;

            scene.add(new THREE.HemisphereLight(0xcbeaff, 0x3f5d2e, 1.25));
            const sun = new THREE.DirectionalLight(0xfff1d6, 1.45);
            sun.position.set(-8, 14, -6);
            sun.castShadow = true;
            sun.shadow.mapSize.set(1024, 1024);
            sun.shadow.camera.left = -12;
            sun.shadow.camera.right = 12;
            sun.shadow.camera.top = 14;
            sun.shadow.camera.bottom = -14;
            scene.add(sun);

            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(42, 62),
                new THREE.MeshStandardMaterial({ color: 0x4d8f45, roughness: 1 })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.04;
            ground.receiveShadow = true;
            scene.add(ground);

            const trackWidth = MAX_HORSES * 2;
            const track = new THREE.Mesh(
                new THREE.PlaneGeometry(trackWidth, TRACK_LENGTH),
                new THREE.MeshStandardMaterial({ color: 0xc8955f, roughness: 0.95 })
            );
            track.rotation.x = -Math.PI / 2;
            track.receiveShadow = true;
            scene.add(track);

            for (let lane = 1; lane < MAX_HORSES; lane++) {
                const x = -trackWidth / 2 + lane * 2;
                for (let z = -TRACK_LENGTH / 2 + 0.6; z < TRACK_LENGTH / 2; z += 1.4) {
                    const dash = new THREE.Mesh(
                        new THREE.BoxGeometry(0.035, 0.012, 0.72),
                        new THREE.MeshBasicMaterial({ color: 0xfff4d8 })
                    );
                    dash.position.set(x, 0.012, z);
                    scene.add(dash);
                }
            }

            addTrackRail(-trackWidth / 2 - 0.45);
            addTrackRail(trackWidth / 2 + 0.45);
            addScenery();

            const startLine = new THREE.Mesh(
                new THREE.BoxGeometry(trackWidth, 0.025, 0.14),
                new THREE.MeshBasicMaterial({ color: 0x35e06f })
            );
            startLine.position.set(0, 0.02, -TRACK_LENGTH / 2 + 1);
            scene.add(startLine);

            const finishLine = new THREE.Mesh(
                new THREE.BoxGeometry(trackWidth, 0.025, 0.18),
                new THREE.MeshBasicMaterial({ color: 0xffffff })
            );
            finishLine.position.set(0, 0.02, TRACK_LENGTH / 2 - 1);
            scene.add(finishLine);
            createFinishGate(trackWidth, TRACK_LENGTH / 2 - 1);

            const loadingManager = new THREE.LoadingManager();
            loadingManager.onLoad = () => {
                createCharacterThumbnails();
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('setupPhase').style.display = 'block';
            };
            loadingManager.onError = (url) => {
                console.error('読み込みに失敗しました:', url);
                document.getElementById('loadingOverlay').textContent = '3Dデータの読み込みに失敗しました';
            };

            const textureLoader = new THREE.TextureLoader(loadingManager);
            const gltfLoader = new THREE.GLTFLoader(loadingManager);

            load3DCharacter(gltfLoader, OTO_MODEL_FILE, 0, 'オト');
            load3DCharacter(gltfLoader, SYAORAN_MODEL_FILE, 1, 'シャオラン');
            load3DCharacter(gltfLoader, NEMU_MODEL_FILE, 2, 'ネム');
            load3DCharacter(gltfLoader, UKA_MODEL_FILE, 3, 'ウカ');
        }

        function load3DCharacter(loader, modelFile, index, name) {
            loader.load(modelFile, (gltf) => {
                const character = gltf.scene;
                character.name = name;
                character.scale.setScalar(1.05);
                character.visible = false;
                character.userData.baseY = 0;
                character.jumpState = { active: false, startTime: 0 };
                character.traverse((node) => {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
                    }
                });
                characters[index] = character;
                scene.add(character);

                if (gltf.animations.length > 0) {
                    const mixer = new THREE.AnimationMixer(character);
                    mixer.clipAction(gltf.animations[0]).play();
                    characterMixers[index] = mixer;
                }
            });
        }

        function addTrackRail(x) {
            const material = new THREE.MeshStandardMaterial({ color: 0xf7efe1, roughness: 0.72 });
            const top = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, TRACK_LENGTH + 1.5), material);
            top.position.set(x, 0.72, 0);
            top.castShadow = true;
            scene.add(top);
            for (let z = -TRACK_LENGTH / 2; z <= TRACK_LENGTH / 2; z += 2.5) {
                const post = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.82, 0.14), material);
                post.position.set(x, 0.38, z);
                post.castShadow = true;
                scene.add(post);
            }
        }

        function addScenery() {
            const trunkMaterial = new THREE.MeshStandardMaterial({ color: 0x725038, roughness: 1 });
            const leafMaterial = new THREE.MeshStandardMaterial({ color: 0x2e783f, roughness: 0.9 });
            for (let z = -10; z <= 12; z += 4) {
                [-7, 7].forEach((x, side) => {
                    const offsetZ = z + side * 1.3;

                    // 横カメラのゴール映像を隠す手前右側の木だけ除外
                    if (x === 7 && z === 6) return;

                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.22, 1.5, 8), trunkMaterial);
                    trunk.position.set(x, 0.75, offsetZ);
                    trunk.castShadow = true;
                    scene.add(trunk);
                    const crown = new THREE.Mesh(new THREE.ConeGeometry(1.15, 2.4, 10), leafMaterial);
                    crown.position.set(x, 2.35, offsetZ);
                    crown.castShadow = true;
                    scene.add(crown);
                });
            }
        }

        function createFinishGate(trackWidth, z) {
            const material = new THREE.MeshStandardMaterial({ color: 0x6a1b9a, roughness: 0.55 });
            [-trackWidth / 2 - 0.2, trackWidth / 2 + 0.2].forEach((x) => {
                const post = new THREE.Mesh(new THREE.BoxGeometry(0.25, 3.3, 0.25), material);
                post.position.set(x, 1.65, z);
                post.castShadow = true;
                scene.add(post);
            });
            const banner = new THREE.Mesh(
                new THREE.BoxGeometry(trackWidth + 0.7, 0.55, 0.18),
                new THREE.MeshStandardMaterial({ color: 0xffd54f, emissive: 0x4d2500, emissiveIntensity: 0.2 })
            );
            banner.position.set(0, 3.05, z);
            banner.castShadow = true;
            scene.add(banner);
        }

        function createSingleObstacle(lane, positionZ) {
            const lanePositionX = (lane - (numHorses - 1) / 2) * 2;
            for(const obs of obstacles) { if (Math.abs(obs.z - positionZ) < 2.0) return; }
            const isRock = Math.random() > 0.5;
            const obstacleData = { lane, z: positionZ };
            obstacles.push(obstacleData);
            let obstacleMesh;
            if(isRock) {
                obstacleMesh = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({ color: 0x8d6e63 }));
                obstacleMesh.position.set(lanePositionX, 0.25, positionZ);
            } else {
                obstacleMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.1, 16), new THREE.MeshStandardMaterial({ color: 0x4e342e }));
                obstacleMesh.position.set(lanePositionX, 0.05, positionZ);
            }
            obstacleMesh.castShadow = true; scene.add(obstacleMesh); obstacleMeshes.push(obstacleMesh);
        }
        
        function jumpCharacter(index) {
            const character = characters[index];
            if (!character || character.jumpState.active) return;
            character.jumpState = { active: true, startTime: Date.now() };
        }

        function createCharacterThumbnails() {
            const previewRenderer = new THREE.WebGLRenderer({
                alpha: true,
                antialias: true,
                preserveDrawingBuffer: true,
                powerPreference: 'low-power'
            });
            previewRenderer.setPixelRatio(1);
            previewRenderer.setSize(320, 220, false);
            previewRenderer.setClearColor(0x000000, 0);
            previewRenderer.outputEncoding = THREE.sRGBEncoding;
            previewRenderer.toneMapping = THREE.ACESFilmicToneMapping;
            previewRenderer.toneMappingExposure = 1.1;

            const previewScene = new THREE.Scene();
            previewScene.add(new THREE.HemisphereLight(0xffffff, 0x73506e, 1.65));
            const previewLight = new THREE.DirectionalLight(0xfff2df, 1.8);
            previewLight.position.set(2.5, 4, 3.5);
            previewScene.add(previewLight);

            const previewCamera = new THREE.PerspectiveCamera(34, 320 / 220, 0.1, 20);
            previewCamera.position.set(0, 0.92, 3.45);
            previewCamera.lookAt(0, 0.9, 0);

            characters.forEach((character, index) => {
                if (!character) return;
                const parent = character.parent;
                const savedPosition = character.position.clone();
                const savedRotation = character.rotation.clone();
                const savedScale = character.scale.clone();
                const savedVisible = character.visible;

                if (characterMixers[index]) characterMixers[index].setTime(0.22);
                previewScene.add(character);
                character.position.set(0, 0, 0);
                character.rotation.set(0, 0, 0);
                character.scale.setScalar(1.05);
                character.visible = true;

                previewRenderer.render(previewScene, previewCamera);
                characterThumbnails[index] = previewRenderer.domElement.toDataURL('image/webp', 0.88);

                if (parent) parent.add(character);
                character.position.copy(savedPosition);
                character.rotation.copy(savedRotation);
                character.scale.copy(savedScale);
                character.visible = savedVisible;
            });

            previewRenderer.dispose();
            if (previewRenderer.forceContextLoss) previewRenderer.forceContextLoss();
        }

        function generateHorseSelection() {
            const selectionDiv = document.getElementById('horseSelection');
            selectionDiv.innerHTML = '';
            currentHorses.forEach((horse, index) => {
                const card = document.createElement('div');
                card.className = 'horse-card' + (horse.is3D ? ' oto-card' : '');
                card.dataset.horse = index;
                card.style.setProperty(
                    '--char-bg',
                    'radial-gradient(circle at 50% 38%, rgba(255,93,143,.5), rgba(124,77,255,.12) 46%, transparent 72%)'
                );

                const preview = characterThumbnails[index]
                    ? '<img src="' + characterThumbnails[index] + '" alt="' + horse.name + 'の3Dキャラクター">'
                    : '<span class="preview-fallback">' + horse.emoji + '</span>';

                card.innerHTML =
                    '<span class="model-badge">3D</span>' +
                    '<div class="character-preview">' + preview + '</div>' +
                    '<div class="horse-name">' + horse.name + '</div>' +
                    '<div class="horse-lane">レーン ' + (index + 1) + '</div>';

                card.addEventListener('click', () => {
                    document.querySelectorAll('.horse-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    selectedHorse = index;
                });
                selectionDiv.appendChild(card);
            });
        }

        function animate() {
            animationId = requestAnimationFrame(animate);
            const now = Date.now();
            const delta = Math.min(clock.getDelta(), 0.05);

            characterMixers.forEach((mixer) => {
                if (mixer && gameState === 'racing') mixer.update(delta * 1.35);
            });

            characters.forEach((character, index) => {
                if (!character) return;
                const baseY = character.userData.baseY || 0;
                if (character.jumpState.active) {
                    const elapsedTime = now - character.jumpState.startTime;
                    if (elapsedTime >= 600) {
                        character.position.y = baseY;
                        character.jumpState.active = false;
                    } else {
                        character.position.y = baseY + Math.sin((elapsedTime / 600) * Math.PI);
                    }
                }
                if (gameState === 'racing' && !character.jumpState.active && index !== 0) {
                    character.rotation.y = Math.sin(now * 0.01 + index * 2) * 0.1;
                }
                if (gameState === 'racing' && index < numHorses) {
                    const targetZ = -TRACK_LENGTH / 2 + 1 + raceProgress[index];
                    character.position.z = THREE.MathUtils.lerp(character.position.z, targetZ, 0.1);
                }
            });

            if (gameState === 'racing' && raceProgress.length > 0) {
                const leaderProgress = Math.max(...raceProgress);
                const leaderZ = -TRACK_LENGTH / 2 + 1 + leaderProgress;
                const sideCameraActive = leaderProgress >= FINISH_LINE - 4.5;

                if (sideCameraActive) {
                    const finishZ = TRACK_LENGTH / 2 - 1;
                    camera.position.x = THREE.MathUtils.lerp(camera.position.x, 10.5, 0.07);
                    camera.position.y = THREE.MathUtils.lerp(camera.position.y, 3.1, 0.07);
                    camera.position.z = THREE.MathUtils.lerp(camera.position.z, finishZ - 1.0, 0.07);
                    cameraTarget.x = THREE.MathUtils.lerp(cameraTarget.x, 0, 0.09);
                    cameraTarget.y = THREE.MathUtils.lerp(cameraTarget.y, 0.95, 0.09);
                    cameraTarget.z = THREE.MathUtils.lerp(cameraTarget.z, finishZ, 0.09);
                    camera.lookAt(cameraTarget);
                } else {
                    camera.position.z = THREE.MathUtils.lerp(camera.position.z, leaderZ + 7.5, 0.045);
                    camera.position.x = THREE.MathUtils.lerp(camera.position.x, 0, 0.04);
                    camera.position.y = THREE.MathUtils.lerp(camera.position.y, 4.2, 0.04);
                    cameraTarget.x = THREE.MathUtils.lerp(cameraTarget.x, 0, 0.06);
                    cameraTarget.y = THREE.MathUtils.lerp(cameraTarget.y, 1.05, 0.06);
                    cameraTarget.z = THREE.MathUtils.lerp(cameraTarget.z, leaderZ - 3, 0.06);
                    camera.lookAt(cameraTarget);
                }
            }
            renderer.render(scene, camera);
        }

        function startRace() {
            if (selectedHorse === null) { alert('予想する忍びを選んでください！'); return; }
            stumbleTimers = new Array(numHorses).fill(0);
            let spawnedObstacleCount = 0;
            const MAX_OBSTACLES_PER_RACE = 2;
            const raceBgm = document.getElementById('raceBgm');
            raceBgm.play().catch(e => console.error("BGMの再生に失敗しました:", e));
            gameState = 'racing';
            raceProgress = new Array(numHorses).fill(0);
            speeds = new Array(numHorses).fill(0);
            winner = null;
            document.getElementById('bettingPhase').style.display = 'none';
            document.getElementById('racingPhase').style.display = 'block';
            document.getElementById('selectedHorseName').textContent = currentHorses[selectedHorse].name;

            const raceInterval = setInterval(() => {
                if (spawnedObstacleCount < MAX_OBSTACLES_PER_RACE && Math.random() < 0.015) {
                    let leaderIndex = 0, maxProgress = 0;
                    raceProgress.forEach((prog, index) => { if (prog > maxProgress) { maxProgress = prog; leaderIndex = index; } });
                    const spawnZ = -TRACK_LENGTH / 2 + 1 + maxProgress + 3.0;
                    if (spawnZ < FINISH_LINE - 2) { createSingleObstacle(leaderIndex, spawnZ); spawnedObstacleCount++; }
                }
                for (let i = 0; i < numHorses; i++) {
                    const character = characters[i];
                    if (stumbleTimers[i] > 0) {
                        stumbleTimers[i]--; speeds[i] = 0;
                        if (stumbleTimers[i] === 0) character.rotation.x = 0;
                        continue;
                    }
                    let obstacleAhead = false;
                    const characterZ = -TRACK_LENGTH / 2 + 1 + raceProgress[i];
                    for (const obs of obstacles) {
                        if (obs.lane === i && obs.z > characterZ && obs.z - characterZ < 1.5) {
                            obstacleAhead = true; break;
                        }
                    }
                    if (obstacleAhead && !character.jumpState.active) {
                        if (Math.random() < 0.7) { jumpCharacter(i); } 
                        else { stumbleTimers[i] = 20; character.rotation.x = 0.5; }
                    }
                    speeds[i] = Math.random() * 0.18 + 0.04;
                    raceProgress[i] = Math.min(FINISH_LINE, raceProgress[i] + speeds[i]);
                }
                const finished = raceProgress.findIndex(progress => progress >= FINISH_LINE);
                if (finished !== -1) {
                    clearInterval(raceInterval); winner = finished; gameState = 'finished';
                    if (finished === selectedHorse) score += 10;
                    raceCount++; updateUI(); showResult();
                }
            }, 100);
        }
        
        function resetGame() {
            clearConfetti();
            const raceBgm = document.getElementById('raceBgm');
            raceBgm.pause(); raceBgm.currentTime = 0;
            obstacleMeshes.forEach(mesh => scene.remove(mesh));
            obstacles = []; obstacleMeshes = [];
            gameState = 'setup'; selectedHorse = null; winner = null;
            numHorses = 0; currentHorses = [];
            characters.forEach(c => {
                if (!c) return;
                c.visible = false;
                c.rotation.set(0, 0, 0);
                c.position.y = c.userData.baseY || 0;
                c.jumpState.active = false;
            });
            camera.position.set(0, 4.2, 15);
            cameraTarget.set(0, 1, 5);
            camera.lookAt(cameraTarget);
            document.getElementById('resultPhase').style.display = 'none';
            document.getElementById('bettingPhase').style.display = 'none';
            document.getElementById('racingPhase').style.display = 'none';
            document.getElementById('setupPhase').style.display = 'block';
        }

        function setupRace(count) { numHorses = count; currentHorses = allHorses.slice(0, numHorses); gameState = 'betting'; document.getElementById('setupPhase').style.display = 'none'; document.getElementById('bettingPhase').style.display = 'block'; generateHorseSelection(); resetCharacters(); }
        function resetCharacters() {
            characters.forEach((character, index) => {
                if (!character) return;
                if (index < numHorses) {
                    character.visible = true;
                    const lanePositionX = (index - (numHorses - 1) / 2) * 2;
                    const baseY = character.userData.baseY || 0;
                    character.position.set(lanePositionX, baseY, -TRACK_LENGTH / 2 + 1);
                } else {
                    character.visible = false;
                }
            });
        }
        function launchConfetti() {
            const layer = document.getElementById('confettiLayer');
            const colors = ['#ff5f96', '#ffd85c', '#68dfc1', '#8d6bff', '#68c9ff', '#ff9068', '#ffffff'];
            layer.innerHTML = '';
            layer.classList.add('active');

            for (let i = 0; i < 96; i++) {
                const piece = document.createElement('i');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + 'vw';
                piece.style.background = colors[i % colors.length];
                piece.style.width = 6 + Math.random() * 8 + 'px';
                piece.style.height = 10 + Math.random() * 14 + 'px';
                piece.style.setProperty('--fall-duration', 2.4 + Math.random() * 1.8 + 's');
                piece.style.setProperty('--fall-delay', Math.random() * 0.45 + 's');
                piece.style.setProperty('--drift', -110 + Math.random() * 220 + 'px');
                piece.style.setProperty('--spin', 480 + Math.random() * 720 + 'deg');
                if (i % 4 === 0) piece.style.borderRadius = '50%';
                layer.appendChild(piece);
            }

            window.setTimeout(clearConfetti, 4500);
        }

        function clearConfetti() {
            const layer = document.getElementById('confettiLayer');
            if (!layer) return;
            layer.classList.remove('active');
            layer.innerHTML = '';
        }

        function showResult() {
            document.getElementById('racingPhase').style.display = 'none';
            document.getElementById('resultPhase').style.display = 'block';
            document.getElementById('winnerName').textContent = currentHorses[winner].name;

            const resultMessage = document.getElementById('resultMessage');
            const resultTitle = resultMessage.querySelector('.result-title');
            const points = resultMessage.querySelector('.points');

            launchConfetti();

            if (selectedHorse === winner) {
                resultMessage.className = 'result-message success';
                resultTitle.textContent = '予想的中！';
                points.textContent = '+10ポイント獲得！';
            } else {
                resultMessage.className = 'result-message failure';
                resultTitle.textContent = '予想はずれ…';
                points.textContent = 'あなたの予想: ' + currentHorses[selectedHorse].name;
            }
        }

        function updateUI() { document.getElementById('score').textContent = score; document.getElementById('raceCount').textContent = raceCount; }
        function onWindowResize() {
            const canvas = document.getElementById('gameCanvas');
            camera.aspect = canvas.clientWidth / canvas.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);
        }

        window.addEventListener('load', () => { init(); animate(); window.addEventListener('resize', onWindowResize); });
    </script>
</body>
</html>
